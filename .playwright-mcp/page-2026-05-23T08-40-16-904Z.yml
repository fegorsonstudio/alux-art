      - generic [ref=e10]:
        - heading "1. Who We Are" [level=2] [ref=e11]
        - paragraph [ref=e12]: Alux Art and Frames (“Alux Art”, “we”, “us”) operates the Virtual Photo Studio at aluxartandframes.shop. This Privacy Policy explains what personal data we collect, why we collect it, and how we protect it.
        - paragraph [ref=e13]:
          - strong [ref=e14]: "Data Controller:"
          - text: Alux Art and Frames, Nigeria.
          - strong [ref=e15]: "Contact:"
          - link "aluxartandframes@gmail.com" [ref=e16] [cursor=pointer]:
            - /url: mailto:aluxartandframes@gmail.com
        - heading "2. Data We Collect" [level=2] [ref=e17]
        - paragraph [ref=e18]:
          - strong [ref=e19]: "Account data:"
          - text: Your email address, display name (if provided), and authentication credentials when you register.
        - paragraph [ref=e20]:
          - strong [ref=e21]: "Identity photos:"
          - text: When you create a shoot, you upload photos of your face and body. These are used by our AI system to generate your portraits. Because these photos contain biometric information, we treat them with the highest level of care and restrict their use strictly to your shoot.
        - paragraph [ref=e22]:
          - strong [ref=e23]: "Transaction data:"
          - text: Purchase history, template identifiers, Paystack transaction references, and shoot credits.
        - paragraph [ref=e24]:
          - strong [ref=e25]: "Creator data:"
          - text: If you register as a Creator, we collect your bank account details (account number, bank name, and account name) for payout purposes.
        - paragraph [ref=e26]:
          - strong [ref=e27]: "Usage data:"
          - text: Pages visited, features used, and error logs for debugging purposes. We do not use third-party analytics or advertising trackers.
        - heading "3. How We Use Your Data" [level=2] [ref=e28]
