        - paragraph [ref=e99]:
          - text: To exercise any of these rights, email us at
          - link "aluxartandframes@gmail.com" [ref=e100] [cursor=pointer]:
            - /url: mailto:aluxartandframes@gmail.com
          - text: . We will respond within 30 days.
        - heading "8. Security" [level=2] [ref=e101]
        - paragraph [ref=e102]: We use encrypted connections (HTTPS) for all data in transit, Supabase Row-Level Security to enforce access controls on our database, and server-side-only API keys that never reach the browser. We do not store payment card details — Paystack handles all card data in a PCI-compliant environment.
        - heading "9. Cookies" [level=2] [ref=e103]
        - paragraph [ref=e104]: We use only functional cookies required for authentication and session management. We do not use advertising, tracking, or third-party analytics cookies.
        - heading "10. Children" [level=2] [ref=e105]
        - paragraph [ref=e106]: The Platform is not intended for users under 18 years of age. We do not knowingly collect personal data from minors. If you believe a minor has provided us with personal data, please contact us and we will delete it promptly.
        - heading "11. Changes to This Policy" [level=2] [ref=e107]
        - paragraph [ref=e108]: We may update this Privacy Policy from time to time. When we do, we will update the effective date at the top of this page. Your continued use of the Platform after changes are posted constitutes your acceptance of the revised Policy.
