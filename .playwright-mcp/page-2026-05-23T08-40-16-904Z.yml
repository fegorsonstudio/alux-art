        - heading "7. Your Rights" [level=2] [ref=e86]
        - paragraph [ref=e87]: "You have the right to:"
        - list [ref=e88]:
          - listitem [ref=e89]:
            - strong [ref=e90]: Access
            - text: the personal data we hold about you.
          - listitem [ref=e91]:
