              - cell "Debugging and improving the service" [ref=e49]
        - paragraph [ref=e50]: We do not sell your data. We do not use your identity photos to train AI models. We do not run advertising on the Platform.
        - heading "4. Identity Photos — Special Notice" [level=2] [ref=e51]
        - paragraph [ref=e52]: "Your identity photos (selfies and pose references you upload) receive the strongest protections we apply:"
        - list [ref=e53]:
          - listitem [ref=e54]: Stored in Supabase secure storage, accessible only to you and our generation pipeline during your active shoot.
          - listitem [ref=e55]: Used solely to generate your requested portraits for that shoot.
          - listitem [ref=e56]: Not shared with third parties.
          - listitem [ref=e57]: Automatically and permanently deleted within 48 hours of shoot completion or expiry.
        - paragraph [ref=e58]: We process your identity photos under the consent you give when you create a shoot. You may withdraw consent at any time by not submitting new shoots; existing photos will be deleted on their normal 48-hour cycle.
        - heading "5. Sharing Your Data" [level=2] [ref=e59]
        - paragraph [ref=e60]: "We share data only where necessary to deliver the Service:"
