# /etc/nginx/sites-available/aluxart
# Copy to: sudo cp deploy/nginx.conf /etc/nginx/sites-available/aluxart
# Enable:  sudo ln -s /etc/nginx/sites-available/aluxart /etc/nginx/sites-enabled/
# SSL:     sudo certbot --nginx -d aluxartandframes.shop -d www.aluxartandframes.shop
# Reload:  sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name aluxartandframes.shop www.aluxartandframes.shop;

    # Redirect www → apex
    if ($host = www.aluxartandframes.shop) {
        return 301 https://aluxartandframes.shop$request_uri;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;

        # Headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';

        # Timeouts — must cover maxDuration:300 routes (base-lock, start, events)
        proxy_read_timeout 310s;
        proxy_send_timeout 310s;
        proxy_connect_timeout 10s;

        # SSE: disable buffering for /api/shoots/*/events
        proxy_buffering off;
        proxy_cache off;
    }

    # Static assets — serve directly, long cache
    location /_next/static/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location /favicon.ico {
        proxy_pass http://127.0.0.1:3000;
        access_log off;
    }
}
# Certbot will append the HTTPS block below after running:
# sudo certbot --nginx -d aluxartandframes.shop
